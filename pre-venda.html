<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pré-venda — Seal Go</title>
  <meta name="description" content="Garanta seu iPhone na pré-venda da Seal Go. Leva 2 minutos, sem consulta que te bloqueia." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&f[]=dm-mono@400,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #3042e6;
      --blue-dark: #1b2bb8;
      --blue-soft: #e2e4f6;
      --bg: #f3f3f3;
      --ink: #0a0a0a;
      --muted: rgba(0, 0, 0, 0.56);
      --sans: "General Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .pv-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(243, 243, 243, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.07);
    }

    .pv-logo {
      color: var(--blue);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.04em;
      text-decoration: none;
    }

    .pv-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 160ms ease;
    }

    .pv-back:hover { opacity: 1; }

    .pv-main {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .pv-eyebrow {
      margin: 0 0 18px;
      color: var(--blue);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
    }

    .pv-title {
      margin: 0 auto;
      max-width: 680px;
      color: var(--ink);
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 1;
      text-align: center;
    }

    .pv-sub {
      margin: 20px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 20px);
      line-height: 1.45;
      text-align: center;
    }

    .pv-card {
      margin: 44px auto 0;
      padding: 18px;
      border: 1px solid rgba(0, 0, 0, 0.09);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
    }

    [data-youform-embed] {
      display: block;
      min-height: 700px;
    }

    [data-youform-embed] iframe {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 14px;
    }

    .pv-trust {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 18px;
      margin: 28px auto 0;
      max-width: 680px;
    }

    .pv-trust span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .pv-trust span::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--blue);
    }

    .pv-footer {
      padding: 28px 24px 40px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .pv-main { padding: 36px 16px 60px; }
      .pv-card { padding: 12px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <header class="pv-header">
    <a class="pv-logo" href="./index.html">SealGo</a>
    <a class="pv-back" href="./index.html" aria-label="Voltar para a página inicial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      Voltar
    </a>
  </header>

  <main class="pv-main">
    <p class="pv-eyebrow">Pré-venda aberta — Locação de iPhone</p>
    <h1 class="pv-title">Garanta seu iPhone na pré-venda</h1>
    <p class="pv-sub">Leva 2 minutos, sem consulta que te bloqueia. Preencha abaixo e a gente te chama no WhatsApp com sua proposta.</p>

    <div class="pv-trust">
      <span>Sem consulta ao SPC/Serasa</span>
      <span>Entrada facilitada</span>
      <span>Boleto mensal, sem cartão</span>
    </div>

    <div class="pv-card">
      <div data-youform-embed data-form="ssgqsypc" data-base-url="https://app.youform.com" data-width="100%" data-height="700"></div>
    </div>
  </main>

  <footer class="pv-footer">© 2026 Seal Store</footer>

  <script src="https://app.youform.com/embed.js"></script>
</body>
</html>
