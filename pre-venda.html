<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pré-venda — Seal Go</title>
  <meta name="description" content="Garanta seu iPhone na pré-venda da Seal Go. Leva 2 minutos, sem consulta que te bloqueia." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./assets/brand/seal-mark-white.png" />
  <link rel="apple-touch-icon" href="./assets/brand/seal-mark-black.png" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&f[]=dm-mono@400,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #3042e6;
      --bg: #000000;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
      --line: rgba(255, 255, 255, 0.12);
      --sans: "General Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .pv-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .pv-logo {
      display: block;
      width: 112px;
      text-decoration: none;
    }

    .pv-logo img {
      display: block;
      width: 100%;
      height: auto;
    }

    .pv-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      opacity: 0.66;
      transition: opacity 160ms ease;
    }

    .pv-back:hover { opacity: 1; }

    .pv-main {
      position: relative;
      z-index: 1;
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 44px 24px 32px;
    }

    .pv-eyebrow {
      margin: 0 0 14px;
      color: #7d8cff;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
    }

    .pv-title {
      margin: 0 auto;
      max-width: 680px;
      color: #fff;
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 1;
      text-align: center;
    }

    .pv-sub {
      margin: 16px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.4;
      text-align: center;
    }

    .pv-trust {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 18px;
      margin: 18px auto 0;
      max-width: 680px;
    }

    .pv-trust span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .pv-trust span::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--blue);
    }

    .pv-form {
      width: min(640px, 100%);
      margin: 18px auto 0;
    }

    [data-youform-embed] {
      display: block;
      width: 100%;
      min-height: 520px;
      background: transparent;
    }

    [data-youform-embed] iframe {
      display: block;
      width: 100% !important;
      border: 0 !important;
      background: transparent !important;
      color-scheme: normal;
    }

    /* SEAL GO wordmark (igual ao footer) */
    .pv-wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 40px 0 6px;
      overflow: hidden;
      user-select: none;
    }

    .pv-wordmark img {
      display: block;
      width: min(82vw, 980px);
      height: auto;
      opacity: 0.16;
    }

    .pv-base {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px 24px;
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 22px 32px 30px;
      border-top: 1px solid var(--line);
      color: rgba(255, 255, 255, 0.46);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .pv-main { padding: 24px 16px 24px; }
      .pv-eyebrow { font-size: 11px; margin-bottom: 12px; }
      .pv-title { font-size: 27px; max-width: 340px; }
      .pv-sub { font-size: 15px; margin-top: 12px; }
      .pv-trust { gap: 7px 14px; margin-top: 14px; }
      .pv-trust span { font-size: 12.5px; }
      .pv-form { margin-top: 14px; }
      .pv-wordmark { margin-top: 24px; font-size: 21vw; }
      .pv-base { padding: 20px 20px 26px; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header class="pv-header">
    <a class="pv-logo" href="./index.html" aria-label="Seal Go — página inicial">
      <img src="./assets/brand/seal-go-white.png" alt="Seal Go" />
    </a>
    <a class="pv-back" href="./index.html" aria-label="Voltar para a página inicial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      Voltar
    </a>
  </header>

  <main class="pv-main">
    <p class="pv-eyebrow">Pré-venda aberta — Locação de iPhone</p>
    <h1 class="pv-title">Garanta seu iPhone na pré-venda</h1>
    <p class="pv-sub">Leva apenas 2 minutos. Preencha abaixo e a gente te chama no WhatsApp com os próximos passos.</p>

    <div class="pv-trust">
      <span>Sem consulta ao SPC/Serasa</span>
      <span>Entrada facilitada</span>
      <span>Boleto mensal, sem cartão</span>
    </div>

    <div class="pv-form">
      <div data-youform-embed data-form="ssgqsypc" data-base-url="https://app.youform.com" data-width="100%" data-height="520"></div>
    </div>
  </main>

  <div class="pv-wordmark">
    <img src="./assets/brand/seal-go-white.png" alt="Seal Go" />
  </div>

  <div class="pv-base">
    <span>© 2026 Seal Store</span>
    <span>Uma operação da Seal Store</span>
  </div>

  <script src="https://app.youform.com/embed.js"></script>
</body>
</html>
